<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر النخبة الفاخر</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; animation: fadeInUp 0.8s ease forwards; }
        .card img { width: 100%; border-radius: 10px; }
        .price { color: var(--gold); font-size: 1.2em; font-weight: bold; display: block; margin: 10px 0; }
        select, input { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; }
        .btn { background: var(--gold); color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--gold); animation: pulse 3s infinite; }
        @keyframes pulse { 0% { text-shadow: 0 0 5px var(--gold); } 50% { text-shadow: 0 0 20px var(--gold); } 100% { text-shadow: 0 0 5px var(--gold); } }
    </style>
</head>
<body>

    <header>
        <h1>متجر النخبة</h1>
        <p>اختر منتجك، حدد مواصفاتك، واطلب مباشرة عبر الواتساب</p>
    </header>

    <div class="container" id="product-container"></div>

    <script>
        const products = [
            {name: "ساعة رولكس", price: "4900"}, {name: "عطر فرنسي", price: "350"},
            {name: "نظارات شمسية", price: "800"}, {name: "هاتف ذكي", price: "3200"}
        ];

        const container = document.getElementById('product-container');

        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="https://picsum.photos/300/200?random=${i}" alt="${p.name}">
                <h3>${p.name}</h3>
                <span class="price">${p.price} ريال</span>
                <label>اللون:</label>
                <select id="color-${i}"><option>أسود</option><option>ذهبي</option><option>فضي</option></select>
                <label>الكمية:</label>
                <input type="number" id="qty-${i}" value="1" min="1">
                <button class="btn" onclick="orderProduct(${i})">اطلب عبر واتساب</button>
            `;
            container.appendChild(card);
        });

        function orderProduct(i) {
            const product = products[i];
            const color = document.getElementById(`color-${i}`).value;
            const qty = document.getElementById(`qty-${i}`).value;
            const phone = "96877273398";
            const msg = `مرحباً، أريد طلب: ${product.name}%0Aاللون: ${color}%0Aالكمية: ${qty}`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
