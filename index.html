<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الفخم</title>
    <style>
        /* CSS الفخامة */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9f9; }
        
        /* الناف بار (القائمة العلوية) */
        nav { background: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: #333; }
        
        /* قسم الهيرو (الواجهة) */
        .hero { background: #333; color: white; padding: 60px 20px; text-align: center; }
        
        /* شبكة المنتجات */
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 20px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .price { color: #e74c3c; font-weight: bold; margin: 10px 0; display: block; }
        .btn { display: block; background: #2c3e50; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">متجري الفخم</div>
        <div>الرئيسية | التصنيفات | اتصل بنا</div>
    </nav>

    <div class="hero">
        <h1>أحدث المنتجات الحصرية</h1>
        <p>جودة لا تضاهى وأسعار تنافسية</p>
    </div>

    <div class="container">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="منتج">
            <div class="info">
                <h3>ساعة ذكية فاخرة</h3>
                <span class="price">499 ريال</span>
                <a href="#" class="btn">أضف للسلة</a>
            </div>
        </div>
        </div>

</body>
</html>
