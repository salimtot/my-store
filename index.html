<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النخبة الفاخر | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        :root {
            --purple: #9d4edd; /* البنفسجي النيون الاحترافي */
            --purple-dark: #3c096c;
            --purple-glow: rgba(157, 78, 221, 0.3);
            --dark-bg: #050505; /* الأسود الملكي المخملي */
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(157, 78, 221, 0.15);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #e0aaff; /* لمسة لونية - اللافندر المضيء للأسعار */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* تخصيص شريط التمرير (Scrollbar) الفخم */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        /* الهيدر */
        header {
            padding: 100px 20px 60px 20px;
            text-align: center;
            background: radial-gradient(circle at top, #240046 0%, var(--dark-bg) 80%);
            border-bottom: 1px solid var(--card-border);
        }

        header h1 {
            font-size: 3.5rem;
            color: var(--purple);
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 20px var(--purple-glow);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* شريط التنقل الثابت العالي الاحترافية */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--card-border);
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--purple);
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            font-size: 1.4rem;
            transition: 0.3s;
        }

        .cart-icon-container:hover { color: var(--purple); }

        .cart-badge {
            position: absolute;
            top: -8px; right: -12px;
            background: var(--purple);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px var(--purple);
        }

        /* أدوات التحكم والبحث */
        .controls-section {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: #0f0f0f;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 15px var(--purple-glow);
        }

        .search-box i {
            position: absolute;
            right: 20px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--purple);
            color: #fff;
            border-color: var(--purple);
            box-shadow: 0 0 12px var(--purple-glow);
        }

        /* شبكة عرض المنتجات */
        .products-grid {
            max-width: 1200px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--purple);
            box-shadow: 0 12px 40px rgba(157, 78, 221, 0.12);
        }

        .img-box {
            width: 100%; height: 230px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 18px;
            background: #0f0f0f;
        }

        .img-box img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }
