<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النخبة الفاخر | Luxury Store</title>
    <style>
        /* إعدادات الخطوط والألوان الفخمة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        :root {
            --gold: #d4af37;
            --gold-hover: #b8962e;
            --dark-bg: #080808;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* الهيدر والواجهة الرئيسية */
        header {
            position: relative;
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at top, #1a150d 0%, var(--dark-bg) 70%);
            border-bottom: 1px solid var(--card-border);
        }

        header h1 {
            font-size: 3rem;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            animation: glow 3s infinite alternate;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* أدوات البحث والفلترة */
        .controls-section {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-container {
            width: 100%;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 15px 25px;
            background: #121212;
            border: 1px solid var(--card-border);
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        /* شبكة المنتجات */
        .products-grid {
            max-width: 1200px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* بطاقة المنتج المحترفة */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .img-container {
            width: 100%;
            height: 220px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #151515;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 54px;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: 700;
        }

        .product-badge {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* خيارات التخصيص */
        .product-options {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .option-group select, .option-group input {
            background: #181818;
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            width: 120px;
            font-size: 0.9rem;
        }

        .option-group select:focus, .option-group input:focus {
            border-color: var(--gold);
            outline: none;
        }

        /* زر الطلب الاحترافي */
        .btn-whatsapp {
            background: linear-gradient(135deg, var(--gold) 0%, #b8962e 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-whatsapp:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* فوتر الموقع */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* حركات الأنميشن */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            to { text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .filter-tabs { gap: 8px; }
            .tab-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر النخبة الفاخر</h1>

    <section class="controls-section">

        // دالة لعرض وتوليد المنتجات في الصفحة بشكل ديناميكي واحترافي
        function renderStore(itemsList) {
            const wrapper = document.getElementById('products-wrapper');
            wrapper.innerHTML = ""; // تصفية الساحة قبل البناء

            if(itemsList.length === 0) {
                wrapper.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px;">لم يتم العثور على أي منتج يطابق بحثك.</p>`;
                return;
            }

            itemsList.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // توليد قائمة الألوان للمنتج الحالي
                let colorOptions = '';
                item.colors.forEach(color => {
                    colorOptions += `<option value="${color}">${color}</option>`;
                });

                card.innerHTML = `
                    <div>
                        <div class="img-container">
                            <img src="https://picsum.photos/400/320?random=${item.id}" alt="${item.name}">
                        </div>
                        <div class="product-meta">
                            <span class="product-badge">${getCategoryName(item.category)}</span>
                            <span class="product-price">${item.price} ر.ع</span>
                        </div>
                        <h2 class="product-title">${item.name}</h2>
                        <p class="product-desc">${item.desc}</p>
                    </div>
                    
                    <div>
                        <div class="product-options">
                            <div class="option-group">
                                <label>اللون المختبر:</label>
                                <select id="color-select-${item.id}">${colorOptions}</select>
                            </div>
                            <div class="option-group">
                                <label>الكمية المطلوبة:</label>
                                <input type="number" id="qty-input-${item.id}" value="1" min="1">
                            </div>
                        </div>
                        <button class="btn-whatsapp" onclick="processOrder(${item.id})">
                            طلب عبر الواتساب الفوري
                        </button>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        // دالة تحويل الاسم البرمجي للفئة إلى اسم عربي فخم
        function getCategoryName(cat) {
            switch(cat) {
                case 'watches': return 'ساعات ملكية';
                case 'perfumes': return 'عطور نادرة';
                case 'electronics': return 'تقنية ذكية';
                case 'accessories': return 'إكسسوارات';
                default: return 'عام';
            }
        }

        // دالة الانتقال والتبديل بين الفئات الرئيسية
        function switchCategory(category, buttonElement) {
            currentCategory = category;
            
            // تحديث تصميم الأزرار النشطة
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            
            filterProducts();
        }

        // دالة البحث والفلترة المشتركة (تجمع بين البحث النصي واختيار الفئة)
        function filterProducts() {
            const searchKeyword = document.getElementById('search-bar').value.toLowerCase().trim();
            
            const filtered = productsDatabase.filter(product => {
                const matchesCategory = (currentCategory === "all" || product.category === currentCategory);
                const matchesSearch = product.name.toLowerCase().includes(searchKeyword) || product.desc.toLowerCase().includes(searchKeyword);
                return matchesCategory && matchesSearch;
            });

            renderStore(filtered);
        }

        // دالة معالجة الطلب وبناء الرسالة النصية للواتساب
        function processOrder(id) {
            const product = productsDatabase.find(p => p.id === id);
            if(!product) return;

            const selectedColor = document.getElementById(`color-select-${id}`).value;
            const selectedQty = parseInt(document.getElementById(`qty-input-${id}`).value) || 1;
            const totalPrice = product.price * selectedQty;

            // بناء نص الرسالة بأسطر منسقة لتبدو كفاتورة شراء حقيقية
            const baseMessage = `*طلب شراء جديد من متجر النخبة*%0A` +
                                `---------------------------------%0A` +
                                `• *المنتج:* ${product.name}%0A` +
                                `• *الفئة:* ${getCategoryName(product.category)}%0A` +
                                `• *اللون المختار:* ${selectedColor}%0A` +
                                `• *الكمية:* ${selectedQty} قطعة%0A` +
                                `---------------------------------%0A` +
                                `• *إجمالي السعر:* ${totalPrice} ريال عماني%0A%0A` +
                                `أرجو تأكيد الطلب وبدء إجراءات الشحن والتوصيل.`;

            const whatsappUrl = `https://wa.me/${MY_PHONE}?text=${baseMessage}`;
            window.open(whatsappUrl, '_blank');
        }

        // تشغيل المتجر وعرض المنتجات لأول مرة بمجرد تحميل الصفحة
        window.onload = () => {
            renderStore(productsDatabase);
        };
    </script>
</body>
</html>
